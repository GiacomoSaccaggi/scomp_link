# Sync hf-space/ directory to Hugging Face Space
# Triggers on push to main when hf-space/ files change, or on release
name: Deploy HF Space

on:
  push:
    branches: [main]
    paths:
      - 'hf-space/**'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd hf-space
          git init -b main
          git config user.email "giacomo.saccaggi@gmail.com"
          git config user.name "GiacomoSaccaggi"
          git remote add hf https://Euribor512:${HF_TOKEN}@huggingface.co/spaces/Euribor512/scomp-link
          git add .
          git commit -m "Deploy scomp-link MCP server"
          git push hf main --force

      - name: Wait for HF Space to be ready
        run: |
          echo "Waiting 180s for HF Space Docker build..."
          sleep 180
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://Euribor512-scomp-link.hf.space/sse)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" != "503" ] && [ "$STATUS" != "000" ]; then
              echo "Space is up!"
              exit 0
            fi
            sleep 30
          done
          echo "Warning: Space may not be ready yet, attempting Smithery publish anyway"

      - name: Publish to Smithery
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          npx @smithery/cli mcp publish https://Euribor512-scomp-link.hf.space/sse -n giacomosaccaggi/scomp-link
