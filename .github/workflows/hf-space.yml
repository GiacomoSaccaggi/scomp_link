# Sync hf-space/ directory to Hugging Face Space
# Triggers on push to main when hf-space/ files change, or on release
name: Deploy HF Space

on:
  push:
    branches: [main]
    paths:
      - 'hf-space/**'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd hf-space
          git init
          git config user.email "giacomo.saccaggi@gmail.com"
          git config user.name "GiacomoSaccaggi"
          git remote add hf https://Euribor512:${HF_TOKEN}@huggingface.co/spaces/Euribor512/scomp-link
          git add .
          git commit -m "Deploy scomp-link MCP server"
          git push hf main --force
