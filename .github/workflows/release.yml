# Automated release workflow: PyPI + GitHub Release + MCP Registry
# Triggered on new version tags (v*.*.*)
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-extras
      - run: uv run pytest tests/ -q --tb=short

  publish-pypi:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz

  publish-mcp-registry:
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate server.json
        run: python3 -c "import json; d=json.load(open('server.json')); assert 'packages' in d; print('✅ server.json valid')"
      - name: Note
        run: echo "MCP Registry publish requires manual submission at https://registry.modelcontextprotocol.io — server.json is ready in repo root."

  publish-hf-skill:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv sync
      - name: Upload skill to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run python -c "
          from huggingface_hub import HfApi
          api = HfApi(token='$HF_TOKEN')
          api.create_repo('Euribor512/scomp-link-skill', repo_type='dataset', exist_ok=True)
          api.upload_folder(folder_path='skills/scomp-link', repo_id='Euribor512/scomp-link-skill', repo_type='dataset', commit_message='Release ${GITHUB_REF_NAME}')
          print('✅ HuggingFace skill updated')
          "

  publish-docker:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ghcr.io/giacomosaccaggi/scomp-link:${{ github.ref_name }}
            ghcr.io/giacomosaccaggi/scomp-link:latest
            giacomosaccaggi/scomp-link:${{ github.ref_name }}
            giacomosaccaggi/scomp-link:latest
