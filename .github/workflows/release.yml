# Unified release workflow: Test → PyPI → Docker → HF Space → Smithery → GitHub Release
# Single trigger: version tag (v*.*.*)
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-extras
      - run: uv run pytest tests/ -q --tb=short

  publish-pypi:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true

  publish-docker:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ghcr.io/giacomosaccaggi/scomp-link:${{ github.ref_name }}
            ghcr.io/giacomosaccaggi/scomp-link:latest
            giacomosaccaggi/scomp-link:${{ github.ref_name }}
            giacomosaccaggi/scomp-link:latest

  deploy-hf-space:
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd hf-space
          git init -b main
          git config user.email "giacomo.saccaggi@gmail.com"
          git config user.name "GiacomoSaccaggi"
          git remote add hf https://Euribor512:${HF_TOKEN}@huggingface.co/spaces/Euribor512/scomp-link
          git add .
          git commit -m "Deploy scomp-link MCP server ${{ github.ref_name }}"
          git push hf main --force

  publish-smithery:
    needs: deploy-hf-space
    runs-on: ubuntu-latest
    steps:
      - name: Wait for HF Space to be ready
        run: |
          echo "Waiting 180s for HF Space Docker build..."
          sleep 180
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://Euribor512-scomp-link.hf.space/sse)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" != "503" ] && [ "$STATUS" != "000" ]; then
              echo "Space is up!"
              exit 0
            fi
            sleep 30
          done
          echo "Warning: Space may not be ready yet, attempting publish anyway"
      - name: Publish to Smithery
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          npx @smithery/cli mcp publish https://Euribor512-scomp-link.hf.space/sse -n giacomosaccaggi/scomp-link

  publish-hf-skill:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv sync
      - name: Upload skill to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run python -c "
          from huggingface_hub import HfApi
          api = HfApi(token='$HF_TOKEN')
          api.create_repo('Euribor512/scomp-link-skill', repo_type='dataset', exist_ok=True)
          api.upload_folder(folder_path='skills/scomp-link', repo_id='Euribor512/scomp-link-skill', repo_type='dataset', commit_message='Release ${GITHUB_REF_NAME}')
          print('✅ HuggingFace skill updated')
          "

  github-release:
    needs: [publish-pypi, publish-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
