name: Smithery Publish

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Publish as external URL (HF Space)
  # ═══════════════════════════════════════════════════════════════
  publish-url:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up HF Space
        run: |
          for i in 1 2 3 4 5 6; do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://Euribor512-scomp-link.hf.space/ || echo "000")
            echo "Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then break; fi
            sleep 30
          done

      - name: Publish external URL to Smithery
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
            "https://api.smithery.ai/servers/giacomosaccaggi%2Fscomp-link/releases" \
            -H "Authorization: Bearer ${{ secrets.SMITHERY_API_KEY }}" \
            -H "Content-Type: multipart/form-data" \
            -F 'payload={"type":"external","url":"https://Euribor512-scomp-link.hf.space/sse"}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $HTTP_CODE"
          echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::warning::External URL publish returned HTTP $HTTP_CODE — Space may be sleeping"
          fi

  # ═══════════════════════════════════════════════════════════════
  # Build and publish MCPB bundle (stdio/local)
  # ═══════════════════════════════════════════════════════════════
  publish-mcpb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Build MCPB bundle
        working-directory: mcpb
        run: mcpb pack

      - name: Find bundle file
        id: bundle
        working-directory: mcpb
        run: |
          BUNDLE=$(ls *.mcpb 2>/dev/null | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "::error::No .mcpb file found after pack"
            exit 1
          fi
          echo "file=$BUNDLE" >> "$GITHUB_OUTPUT"
          echo "Found bundle: $BUNDLE"

      - name: Publish MCPB bundle to Smithery
        working-directory: mcpb
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
            "https://api.smithery.ai/servers/giacomosaccaggi%2Fscomp-link/releases" \
            -H "Authorization: Bearer ${{ secrets.SMITHERY_API_KEY }}" \
            -F 'payload={"type":"stdio"}' \
            -F "bundle=@${{ steps.bundle.outputs.file }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $HTTP_CODE"
          echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::MCPB bundle publish failed with HTTP $HTTP_CODE"
            exit 1
          fi
